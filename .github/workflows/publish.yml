name: Publish package

on:
  push:
    branches:
      - main
      - master
    paths:
      - package.json
      - package-lock.json
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to upload the tarball to, for example v0.1.2'
        required: false
        type: string

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@woutervanmeel89-lang'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build package
        run: npm run build

      - name: Pack installable tarball
        run: npm pack --pack-destination .

      - name: Upload tarball to release
        if: github.event_name == 'release' || inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.release_tag }}
          files: '*.tgz'
          overwrite_files: true

      - name: Publish to GitHub Packages
        run: |
          set +e
          npm publish 2>&1 | tee publish.log
          publish_status=${PIPESTATUS[0]}

          if [ "$publish_status" -eq 0 ]; then
            exit 0
          fi

          if grep -q "Cannot publish over existing version" publish.log; then
            echo "Package version already exists on GitHub Packages; keeping the release tarball upload."
            exit 0
          fi

          exit "$publish_status"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
